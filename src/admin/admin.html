<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Admin Panel - Manage Blogs</title>

        <!-- Quill CSS -->
        <link
            href="https://cdn.quilljs.com/1.3.6/quill.snow.css"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="admin.css" />
    </head>
    <body>
        <div class="admin-container">
            <h2 class="admin-title">Blog Management</h2>

            <!-- Blog Table -->
            <table class="blog-table">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Date</th>
                        <th>Image</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="blog-list">
                    <!-- Blog items will be dynamically inserted here -->
                </tbody>
            </table>

            <!-- Add New Blog Button -->
            <button class="add-btn" onclick="showAddBlogForm()">
                Add New Blog
            </button>

            <!-- Add/Edit Blog Form -->
            <div id="add-blog-form" class="blog-form" style="display: none">
                <h3 id="form-title">Add Blog</h3>
                <input type="text" id="blog-title" placeholder="Blog Title" />

                <!-- Quill Editor Container -->
                <div id="editor-container" style="height: 200px"></div>

                <!-- Image Upload -->
                <input type="file" id="blog-image" accept="image/*" />
                <div id="current-image" style="display: none">
                    <p>Current Image:</p>
                    <img
                        id="image-preview"
                        src=""
                        alt="Blog Image"
                        style="max-width: 100px"
                    />
                    <button type="button" onclick="removeImage()">
                        Remove Image
                    </button>
                </div>

                <button class="submit-btn" onclick="saveBlog()">Save</button>
                <button class="cancel-btn" onclick="cancelForm()">
                    Cancel
                </button>
            </div>
        </div>

        <!-- Quill.js Script -->
        <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

        <script src="admin.js"></script>
    </body>
</html>
